version: "3"
networks:
  homelab:
    driver: bridge
    external: true
volumes:
  pihole_data: {}
  pihole_dnsmasq: {}
services:
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '67:67/udp'
      - '8000:80/tcp'
    command:
      - '--dns=127.0.0.1'
      - '--dns=1.1.1.1'
    environment:
      TZ: 'Europe/Paris'
      WEBPASSWORD: 'password'
      VIRTUAL_HOST: 'pihole.homelab.lan'
      PROXY_LOCATION: 'pihole.homelab.lan'
      FTTCONF_LOCAL: ${IP}
    volumes:
      - './pihole/custom.list:/etc/pihole/custom.list'
      - 'pihole_data:/etc/pihole'
      - 'pihole_dnsmasq:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN
    networks:
      - homelab
    # labels:
    #   caddy: http://pihole.homelab.lan
