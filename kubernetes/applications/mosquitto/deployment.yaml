apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: mosquitto
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/part-of: mosquitto
    app.kubernetes.io/version: "2.0.22" # renovate: datasource=github-tags packageName=eclipse-mosquitto/mosquitto
  name: mosquitto
  namespace: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: mosquitto
      app.kubernetes.io/name: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: mosquitto
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/part-of: mosquitto
        app.kubernetes.io/version: "2.0.22" # renovate: datasource=github-tags packageName=eclipse-mosquitto/mosquitto
    spec:
      containers:
        - image: >-
            eclipse-mosquitto:2.0.22@sha256:d219d3a72847f3aed6a1d66975972d3b17f86e39e8f6f6b86b4088b879c1a2d6
          name: mosquitto
          ports:
            - containerPort: 8883
              protocol: TCP
            - containerPort: 9001
              protocol: TCP
          volumeMounts:
            - mountPath: /mosquitto/config/
              name: config
            - mountPath: /mosquitto/data/
              name: data
            - mountPath: /mosquitto/passwords/
              name: passwords
      volumes:
        - configMap:
            name: mosquitto-cm-config
          name: config
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-data
        - configMap:
            name: mosquitto-cm-passwords
          name: passwords
