apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: actualbudget
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: actualbudget
    app.kubernetes.io/part-of: actualbudget
    app.kubernetes.io/version: "25.12.0" # renovate: datasource=github-tags packageName=actualbudget/actual
  name: actualbudget
  namespace: actualbudget
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: actualbudget
      app.kubernetes.io/name: actualbudget
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: actualbudget
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: actualbudget
        app.kubernetes.io/part-of: actualbudget
        app.kubernetes.io/version: "25.12.0" # renovate: datasource=github-tags packageName=actualbudget/actual
    spec:
      containers:
        - image: >-
            ghcr.io/actualbudget/actual:25.12.0-alpine@sha256:a9d0a6a406dd0ace4a5e091e139e9d990cd321bdc4a15ddd76271b5aa5e2950e
          imagePullPolicy: IfNotPresent
          name: actualbudget
          ports:
            - containerPort: 5006
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /data
              name: data
      restartPolicy: Always
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actualbudget-pvc-data
