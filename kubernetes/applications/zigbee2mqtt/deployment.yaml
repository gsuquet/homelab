apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: zigbee2mqtt
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/name: zigbee2mqtt
    app.kubernetes.io/part-of: zigbee2mqtt
    app.kubernetes.io/version: "2.7.0" # renovate: datasource=github-tags packageName=Koenkk/zigbee2mqtt
  name: zigbee2mqtt
  namespace: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: zigbee2mqtt
      app.kubernetes.io/name: zigbee2mqtt
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: zigbee2mqtt
        app.kubernetes.io/managed-by: argocd
        app.kubernetes.io/name: zigbee2mqtt
        app.kubernetes.io/part-of: zigbee2mqtt
        app.kubernetes.io/version: 2.7.0
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: zigbee2mqtt-cm-environment
            - secretRef:
                name: zigbee2mqtt-secrets
          image: >-
            ghcr.io/koenkk/zigbee2mqtt:2.7.0@sha256:7da30df2c3e53ea02e0bbce0241306358e946b2b5ce6ec02ecdf90be0a96c694
          name: zigbee2mqtt
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /app/data/
              name: data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: zigbee2mqtt-data
