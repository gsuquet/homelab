version: "3"

services:
  pihole:
    container_name: pihole
    hostname: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - '53:53/tcp'
      - '53:53/udp'
      - '80:80/tcp'
    # env_file:
    #   - .env
    environment:
      TZ: 'Europe/Paris'
      WEBPASSWORD: 'password'
    volumes:
      - './etc-pihole:/etc/pihole/'
    cap_add:
      - NET_ADMIN
    dns:
      - 1.1.1.3
      - 127.0.0.1
    depends_on:
      - dhcphelper
    networks:
      pihole:
        ipv4_address: '192.168.1.0'
    # labels:
    #   caddy: http://pihole.homelab.lan
    #   caddy.encode: gzip zstd
    #   caddy.redir: '/ /admin{uri}'
    #   caddy.reverse_proxy: '{{ 172.20.19.229:80}}'

  dhcphelper:
    build: ./dhcphelper
    container_name: dhcphelper
    hostname: dhcphelper
    restart: unless-stopped
    network_mode: host
    environment:
      IP: '192.168.1.0'
      TZ: 'Europe/Paris'
    cap_add:
      - NET_ADMIN
