---
- name: Set ArgoCD deployment variables
  ansible.builtin.set_fact:
    argocd_namespace: argocd
    argocd_server_deployment: argocd-server
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml
    manifests_path: "{{ playbook_dir }}/../../kubernetes/bootstrap/argo-cd/manifests"
    bootstrap_app: "{{ playbook_dir }}/../../kubernetes/bootstrap/argo-cd/bootstrap-application.yaml"

- name: Check if ArgoCD is already installed
  ansible.builtin.shell: >
    kubectl get deployment {{ argocd_server_deployment }} -n {{ argocd_namespace }}
    --kubeconfig {{ kubeconfig_path }} 2>&1
  register: argocd_status
  changed_when: false
  failed_when: false

- name: Ensure ArgoCD namespace exists
  ansible.builtin.shell: >
    kubectl get namespace {{ argocd_namespace }} --kubeconfig {{ kubeconfig_path }} 2>/dev/null ||
    kubectl create namespace {{ argocd_namespace }} --kubeconfig {{ kubeconfig_path }}
  register: create_namespace
  changed_when: '"created" in create_namespace.stdout'

- name: Copy ArgoCD manifests to remote host
  ansible.builtin.copy:
    src: "{{ manifests_path }}/"
    dest: /tmp/argocd-manifests/
    mode: "0644"

- name: Copy ArgoCD bootstrap application to remote host
  ansible.builtin.copy:
    src: "{{ bootstrap_app }}"
    dest: /tmp/argocd-bootstrap.yaml
    mode: "0644"

- name: Apply ArgoCD rendered manifests
  ansible.builtin.shell: >
    kubectl apply -f /tmp/argocd-manifests
    --server-side
    --force-conflicts
    --kubeconfig {{ kubeconfig_path }}
  register: argocd_apply
  changed_when: '"configured" in argocd_apply.stdout or "created" in argocd_apply.stdout'

- name: Wait for ArgoCD server deployment to be ready
  ansible.builtin.shell: >
    kubectl rollout status deployment/{{ argocd_server_deployment }}
    -n {{ argocd_namespace }}
    --kubeconfig {{ kubeconfig_path }}
    --timeout=300s
  register: argocd_ready
  changed_when: false

- name: Apply ArgoCD bootstrap application (app of apps)
  when: argocd_status.rc != 0
  ansible.builtin.shell: >
    kubectl apply -f /tmp/argocd-bootstrap.yaml
    --server-side
    --kubeconfig {{ kubeconfig_path }}
  register: argocd_bootstrap
  changed_when: '"configured" in argocd_bootstrap.stdout or "created" in argocd_bootstrap.stdout'

- name: Clean up temporary ArgoCD files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/argocd-manifests
    - /tmp/argocd-bootstrap.yaml
